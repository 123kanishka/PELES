services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PELES_MODEL_BACKEND=auto
      - PELES_CORS_ORIGINS=["*"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
